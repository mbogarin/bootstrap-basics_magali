<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Bootstrap Basics</title>

		<!-- Bootstrap CSS CDN link -->
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
			crossorigin="anonymous"
		/>

		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<!-- Nav Bar -->
		<nav class="navbar navbar-expand-md navbar-dark bg-dark">
			<div class="container-fluid">
				<a class="navbar-brand" href="#">Bootstrap Basics</a>

				<!-- 1. Hamburger Menu  -->
				<button
					class="navbar-toggler"
					type="button"
					data-bs-toggle="collapse"
					data-bs-target="#basic-navbar-nav"
				>
					<span class="navbar-toggler-icon"></span>
				</button>
				<!-- /* data-bs-toggle - tells Bootstrap this button will collapse/expand.
                        data-bs-target - points to the element that will be collapsed/expanded via. id (aka. the navbar links right below this) */ -->

				<!-- 2. Navbar Links -->
				<div class="collapse navbar-collapse" id="basic-navbar-nav">
					<ul class="navbar-nav ms-auto">
						<li class="nav-item">
							<a class="nav-link active" href="#">Home</a>
						</li>
						<li class="nav-item">
							<a class="nav-link" href="#">About</a>
						</li>
						<li class="nav-item">
							<a class="nav-link" href="#">Contact</a>
						</li>
					</ul>
				</div>
			</div>
		</nav>

		<!-- Regristration Form + Table -->
		<div class="container mt-5">
			<!-- 1. Form -->
			<form class="p-4 rounded custom-form">
				<h2 class="mb-5">Regristration Form</h2>
				<div class="row">
					<!-- First Name: -->
					<div class="col-md-6 mb-3">
						<label class="form-label">First Name</label>
						<input type="text" class="form-control" required />
					</div>

					<!-- Last Name: -->
					<div class="col-md-6 mb-3">
						<label class="form-label">Last Name</label>
						<input type="text" class="form-control" required />
					</div>

					<!-- Email: -->
					<div class="mb-3">
						<label class="form-label">Email</label>
						<input type="email" class="form-control" required />
					</div>

					<!-- Password: -->
					<div class="mb-4">
						<label class="form-label">Password</label>
						<input type="password" class="form-control" required />
					</div>

					<!-- Checkbox -->
					<div class="checkbox-label form-check mb-5 mt-3 ms-3">
						<label class="form-check-label"
							>Agree to <a href="#">terms</a></label
						>
						<input
							class="form-check-input"
							type="checkbox"
							required
						/>
					</div>

					<!-- Submit Button: -->
					<div class="text-center">
						<button type="submit" class="btn btn-success px-5">
							Submit
						</button>
					</div>
				</div>
			</form>

			<!-- 2. Table -->
			<h2 class="mt-5 mb-3">User Data</h2>

			<div class="table-responsive">
				<table class="table table-striped table-hover">
					<!-- Header -->
					<thead class="table-dark">
						<tr>
							<th>First Name</th>
							<th>Last Name</th>
							<th>Email</th>
						</tr>
					</thead>

					<!-- Body (data) -->
					<tbody>
						<tr>
							<td>John</td>
							<td>Smith</td>
							<td>JohnSmith@email.com</td>
						</tr>

						<tr>
							<td>Jane</td>
							<td>Doe</td>
							<td>Jane.Doe@email.com</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

		<!-- Image & Button Utilities -->
		<!-- 1. Image -->
		<h2 class="mt-5 mb-3 text-center">Images</h2>

		<div class="container-fluid mt-5 text-center">
			<!-- Main responsive image -->
			<img
				src="https://placehold.co/800x300"
				class="img-fluid d-block mx-auto main-image"
				alt="Main Image"
			/>
			<!-- 2. Circular image -->
			<img
				src="https://placehold.co/300"
				class="rounded-circle mt-4 d-block mx-auto circular-image"
				alt="Circular Image"
			/>
		</div>

		<!-- 2. Buttons -->
		<h2 class="mt-5 mb-4 text-center">Buttons</h2>

		<div class="container text-center mb-5">
			<button class="btn btn-primary">Always Visible</button>
			<button class="btn btn-danger d-none d-md-block mx-auto mt-4">
				Hidden on Small Screens
			</button>
		</div>
	</body>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"
	></script>
</html>
